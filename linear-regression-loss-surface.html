<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Superfície de Perda - Regressão Linear</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/aaaakshat/cm-web-fonts@latest/fonts.css">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: #fff;
    color: #111;
    padding: 24px;
    max-width: 700px;
    margin: 0 auto;
  }
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px 24px;
    margin-bottom: 16px;
  }
  .slider-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .slider-group label {
    font-size: 0.85rem;
    font-weight: 500;
    color: #333;
  }
  .slider-group .row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .slider-group input[type="range"] {
    flex: 1;
    accent-color: #007cba;
  }
  .slider-group .val {
    font-family: 'Computer Modern Serif', 'CMU Serif', serif;
    font-size: 0.95rem;
    min-width: 48px;
    text-align: right;
  }
  .math {
    font-family: 'Computer Modern Serif', 'CMU Serif', serif;
    font-style: italic;
    font-size: 1.35em;
  }
  #plot-container {
    width: 100%;
    height: 420px;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .footer {
    background: #f8f7f5;
    border-radius: 10px;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  .footer .item {
    font-family: 'Computer Modern Serif', 'CMU Serif', serif;
    font-size: 1.1rem;
    color: #444;
  }
</style>
</head>
<body>

<div class="controls">
  <div class="slider-group">
    <label><span class="math">w</span> (peso / inclinação)</label>
    <div class="row">
      <input id="w-range" type="range" min="-2" max="6" step="0.05" value="2">
      <span class="val" id="w-val">2.00</span>
    </div>
  </div>
  <div class="slider-group">
    <label><span class="math">b</span> (viés / intercepto)</label>
    <div class="row">
      <input id="b-range" type="range" min="-5" max="10" step="0.05" value="1">
      <span class="val" id="b-val">1.00</span>
    </div>
  </div>
</div>

<div id="plot-container"></div>

<div class="footer">
  <div class="item"><span style="font-family:'Inter',sans-serif">reta:</span> <span class="math">y</span> = <span id="eq-display">2.00<span class="math">x</span> + 1.00</span></div>
  <div class="item">MSE = <span id="mse-display">0.00</span></div>
</div>

<script>
(function(){
  const data = [
    {x: 1, y: 3.2},
    {x: 2, y: 5.1},
    {x: 3, y: 6.8},
    {x: 4, y: 9.3},
    {x: 5, y: 10.7},
    {x: 6, y: 13.1}
  ];

  const wRange = document.getElementById('w-range');
  const bRange = document.getElementById('b-range');
  const wVal = document.getElementById('w-val');
  const bVal = document.getElementById('b-val');
  const eqDisplay = document.getElementById('eq-display');
  const mseDisplay = document.getElementById('mse-display');

  const wMin = -2, wMax = 6, wSteps = 60;
  const bMin = -5, bMax = 10, bSteps = 60;

  function mse(w, b) {
    let sum = 0;
    for (const p of data) {
      const err = p.y - (w * p.x + b);
      sum += err * err;
    }
    return sum / data.length;
  }

  // Build surface data
  const wVals = [], bVals = [], zVals = [];
  for (let j = 0; j <= bSteps; j++) {
    const bv = bMin + (j / bSteps) * (bMax - bMin);
    bVals.push(bv);
  }
  for (let i = 0; i <= wSteps; i++) {
    const wv = wMin + (i / wSteps) * (wMax - wMin);
    wVals.push(wv);
    const row = [];
    for (let j = 0; j <= bSteps; j++) {
      row.push(mse(wv, bVals[j]));
    }
    zVals.push(row);
  }

  const surfaceTrace = {
    type: 'surface',
    x: bVals,
    y: wVals,
    z: zVals,
    colorscale: 'Viridis',
    reversescale: true,
    opacity: 0.85,
    showscale: false,
    hoverinfo: 'none'
  };

  const markerTrace = {
    type: 'scatter3d',
    mode: 'markers',
    x: [1],
    y: [2],
    z: [mse(2, 1)],
    marker: {
      size: 7,
      color: '#d9534f',
      line: { color: '#fff', width: 2 }
    },
    hoverinfo: 'none'
  };

  const layout = {
    margin: { l: 0, r: 0, t: 0, b: 0 },
    paper_bgcolor: 'rgba(0,0,0,0)',
    scene: {
      bgcolor: '#f8f7f5',
      xaxis: {
        title: { text: 'b (viés)', font: { family: 'Inter, sans-serif', size: 12, color: '#888' } },
        tickfont: { family: 'Computer Modern Serif, CMU Serif, serif', size: 11, color: '#888' },
        gridcolor: '#e8e6e3',
        zerolinecolor: '#ccc'
      },
      yaxis: {
        title: { text: 'w (peso)', font: { family: 'Inter, sans-serif', size: 12, color: '#888' } },
        tickfont: { family: 'Computer Modern Serif, CMU Serif, serif', size: 11, color: '#888' },
        gridcolor: '#e8e6e3',
        zerolinecolor: '#ccc'
      },
      zaxis: {
        title: { text: 'MSE', font: { family: 'Inter, sans-serif', size: 12, color: '#888' } },
        tickfont: { family: 'Computer Modern Serif, CMU Serif, serif', size: 11, color: '#888' },
        gridcolor: '#e8e6e3',
        zerolinecolor: '#ccc'
      },
      camera: {
        eye: { x: 1.6, y: -1.6, z: 0.9 }
      }
    }
  };

  const config = {
    displayModeBar: false,
    responsive: true
  };

  Plotly.newPlot('plot-container', [surfaceTrace, markerTrace], layout, config);

  function update() {
    const w = parseFloat(wRange.value);
    const b = parseFloat(bRange.value);
    wVal.textContent = w.toFixed(2);
    bVal.textContent = b.toFixed(2);
    const bSign = b >= 0 ? '+' : '−';
    eqDisplay.innerHTML = `${w.toFixed(2)}<span class="math">x</span> ${bSign} ${Math.abs(b).toFixed(2)}`;
    const loss = mse(w, b);
    mseDisplay.textContent = loss.toFixed(2);

    Plotly.restyle('plot-container', {
      x: [[b]],
      y: [[w]],
      z: [[loss]]
    }, [1]);
  }

  wRange.addEventListener('input', update);
  bRange.addEventListener('input', update);
  update();


})();
</script>
</body>
</html>
